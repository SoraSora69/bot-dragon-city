name: Run DragonCity Bot 2
on:
  workflow_dispatch:
    inputs:
      cookie_input:
        description: 'Dán Cookie vào đây:'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run Script
      env:
        MY_COOKIE: ${{ github.event.inputs.cookie_input }}
      run: |
        cat << 'EOF' > bot.py
        import time, requests, random, os, re
        
        cookie = os.environ.get("MY_COOKIE")
        # Tự động tìm ID GMH (DragonCityToolCode) trong Cookie
        match = re.search(r'DragonCityToolCode=([^;]+)', cookie)
        if match:
            user_id = match.group(1)
            print(f"Đã tự động tìm thấy ID GMH: {user_id}", flush=True)
        else:
            print("LỖI: Không tìm thấy ID GMH trong Cookie! Kiểm tra lại Cookie bạn dán.", flush=True)
            exit(1)

        url = "https://gamemodshub.com/game/dragoncity/script/packet"
        session = requests.Session()
        session.headers.update({"Cookie": cookie, "User-Agent": "Mozilla/5.0"})
        
        dem = 0
        loi_lien_tiep = 0
        
        while True:
            if loi_lien_tiep >= 5:
                print("Bot dừng do lỗi liên tiếp quá 5 lần!", flush=True)
                break
                
            try:
                res = session.post(url, data={"user_id": user_id, "cmds": "auto-gold-and-xp-50k", "verify": "true"})
                if "Success" in res.text:
                    dem += 1
                    loi_lien_tiep = 0
                    print(f"Lượt {dem} thành công", flush=True)
                else:
                    loi_lien_tiep += 1
                    print(f"Lỗi (Lần {loi_lien_tiep}/10): {res.text[:30]}", flush=True)
            except Exception as e:
                loi_lien_tiep += 1
                print(f"Lỗi kết nối (Lần {loi_lien_tiep}/10): {e}", flush=True)
                time.sleep(20)
                continue
                
            time.sleep(random.uniform(14, 15))
        EOF
        python bot.py
